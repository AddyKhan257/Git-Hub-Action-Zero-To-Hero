
name: Python lint

on:
    push:
        branches: [main]

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: Python setup 3.15
              uses: actions/setup-python@v5
              with:
                pyython-version: "3.15"

            - name: install dependencies
              run:  pip install -r requirements.txt

            - name: run linter
              run: flake8 app.py




            


    
