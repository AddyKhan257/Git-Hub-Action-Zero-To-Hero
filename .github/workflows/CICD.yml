name: cicd

on: 
  workflow_dispatch:
    inputs:
      environment:
        description: This is environment where this workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - stagging
          
        


jobs:

  code:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        run: echo "code clone from github"
  
  build: 
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: build docker container
        run: echo "docker container build"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: test the container
        run: echo "testing the container"
        
  deploy:
    if: inputs.environment == 'dev'
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: deploy the container
        run: echo "deployed the container"
    


        

        
  
